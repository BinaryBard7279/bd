name: Deploy EOS (Docker Hub + Alembic)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bd_project:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # ШАГ 1: Скачиваем код в раннер деплоя
      - name: Checkout code
        uses: actions/checkout@v4

      # ШАГ 2: Копируем свежие конфиги на сервер (ЭТОГО НЕ ХВАТАЛО)
      - name: Copy compose and config to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml,Caddyfile"
          target: "/root/eos_project"

      # ШАГ 3: Запускаем команды на сервере
      - name: Remote Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root/eos_project
            
            # Обновляем пароли
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=5432" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            echo "DOMAIN=vinogradovnikita.ru" >> .env
            
            # ТЕПЕРЬ ОН УВИДИТ НОВЫЙ ФАЙЛ И СКАЧАЕТ ОБРАЗ
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Авто-миграция
            sleep 5
            docker compose exec -T app alembic upgrade head
            
            docker image prune -f